name: Build Desktop App (Tauri · Win/Mac)

# 触发方式:
#   1) 手动: Actions 页面点 "Run workflow"
#   2) 打 tag: git tag v1.0.0 && git push origin v1.0.0
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macOS
          - os: windows-latest
            name: Windows
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: app-shell/tauri
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app-shell/tauri/src-tauri

      - name: Install deps
        run: npm install

      - name: Generate app icons (from 512 源图)
        run: npx @tauri-apps/cli@2 icon ../web/icons/icon-512.png

      - name: Build Tauri bundles
        run: npm run build

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.name }}
          if-no-files-found: warn
          path: |
            app-shell/tauri/src-tauri/target/release/bundle/**/*.dmg
            app-shell/tauri/src-tauri/target/release/bundle/**/*.app
            app-shell/tauri/src-tauri/target/release/bundle/**/*.msi
            app-shell/tauri/src-tauri/target/release/bundle/**/*.exe
