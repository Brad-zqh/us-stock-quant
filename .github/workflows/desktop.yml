name: Build Desktop App (Tauri · Win/Mac)

# 触发方式:
#   1) 手动: Actions 页面点 "Run workflow"
#   2) 打 tag: git tag v1.0.0 && git push origin v1.0.0
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macOS
          - os: windows-latest
            name: Windows
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: app-shell/tauri
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS universal targets
        if: matrix.name == 'macOS'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app-shell/tauri/src-tauri

      - name: Install deps
        run: npm install

      - name: Generate app icons (from 512 源图)
        run: npx @tauri-apps/cli@2 icon ../web/icons/icon-512.png

      - name: Build Tauri bundles (Windows)
        if: matrix.name == 'Windows'
        run: npm run build

      - name: Build Tauri bundles (macOS universal · Intel+Apple 通吃)
        if: matrix.name == 'macOS'
        run: npx @tauri-apps/cli@2 build --target universal-apple-darwin

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.name }}
          if-no-files-found: warn
          path: |
            app-shell/tauri/src-tauri/target/**/release/bundle/**/*.dmg
            app-shell/tauri/src-tauri/target/**/release/bundle/**/*.app
            app-shell/tauri/src-tauri/target/**/release/bundle/**/*.msi
            app-shell/tauri/src-tauri/target/**/release/bundle/**/*.exe

      - name: Stage Windows installer (稳定文件名)
        if: matrix.name == 'Windows' && startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $f = Get-ChildItem -Recurse src-tauri/target/release/bundle/nsis -Filter *.exe | Select-Object -First 1
          Copy-Item $f.FullName "$env:RUNNER_TEMP/StockQuant-Windows-Setup.exe"

      - name: Stage macOS dmg (稳定文件名)
        if: matrix.name == 'macOS' && startsWith(github.ref, 'refs/tags/')
        run: |
          dmg=$(find src-tauri/target -name '*.dmg' | head -n1)
          cp "$dmg" "$RUNNER_TEMP/StockQuant-macOS.dmg"

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          files: |
            ${{ runner.temp }}/StockQuant-Windows-Setup.exe
            ${{ runner.temp }}/StockQuant-macOS.dmg
