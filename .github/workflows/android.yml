name: Build Android APK (Capacitor)

# 触发: 手动运行, 或打 tag v*
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app-shell/capacitor
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install deps
        run: npm install

      - name: Add & sync Android platform
        run: |
          npx cap add android
          npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-debug
          if-no-files-found: error
          path: app-shell/capacitor/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Stage APK (稳定文件名)
        if: startsWith(github.ref, 'refs/tags/')
        run: cp android/app/build/outputs/apk/debug/app-debug.apk "$RUNNER_TEMP/StockQuant-Android.apk"

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          files: ${{ runner.temp }}/StockQuant-Android.apk
