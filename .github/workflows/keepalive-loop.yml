name: Keep Streamlit Awake (browser)

# 用真实无头浏览器(Playwright/Chromium)保活, 见 .github/keepalive_browser.py 说明。
# 关键: Streamlit 休眠计时器只认真实会话(websocket), 单纯 curl reset 不了它,
# 所以必须真正打开页面停留一会儿。单 job 循环约 5.5h, 每 ~6 分钟一次;
# 配合 concurrency, 上一轮结束时 cron 触发的新一轮无缝接力 -> 全天候。
# public 仓库 Actions 免费无时长限制。停用: Actions 页面 Disable 本 workflow。

on:
  schedule:
    - cron: "*/15 * * * *"   # 反复点火; 有活跃循环时排队, 结束即接力
  workflow_dispatch: {}

concurrency:
  group: streamlit-keepalive
  cancel-in-progress: false

jobs:
  browse-loop:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Playwright (Chromium)
        run: |
          pip install --quiet playwright
          python -m playwright install --with-deps chromium

      - name: Real-browser keepalive loop (~5.5h)
        run: python .github/keepalive_browser.py
